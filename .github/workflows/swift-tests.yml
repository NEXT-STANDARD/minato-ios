name: Build & Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Run Swift Tests
    runs-on: macos-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-build-${{ hashFiles('**/*.swift', '**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ hashFiles('**/Package.resolved') }}
            ${{ runner.os }}-build-

      - name: Build the package
        timeout-minutes: 10
        run: swift build

      - name: Run Tests
        timeout-minutes: 18
        # `--parallel` was hanging on the macOS-latest runner: tests started
        # but never completed, suggesting one slow/flaky test was blocking
        # report aggregation. Run sequentially until the offending test is
        # identified and quarantined (or the runner stabilises).
        run: swift test
