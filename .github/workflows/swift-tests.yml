name: Build & Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Run Swift Tests
    runs-on: macos-latest
    # Defensive caps. Past runs without these stayed `in_progress` for
    # 1-2 hours when a test under `--parallel` hung, tying up the runner.
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-build-${{ hashFiles('**/*.swift', '**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ hashFiles('**/Package.resolved') }}
            ${{ runner.os }}-build-

      - name: Build the package
        timeout-minutes: 10
        run: swift build

      - name: Run Tests
        timeout-minutes: 12
        run: swift test --parallel
